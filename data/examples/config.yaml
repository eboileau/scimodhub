# Configuration file

# List of datasets to include (tracks) - null if fetching data from Sci-ModoM.
metadata_table: data/examples/manifest.tsv # null
# The hub directory. Created if does not exist.
staging_dir: local/staging
# Data wrangling temporary directory. Created if does not exist.
working_dir: local/working

# EUF/bedRMod compatible versions.
euf_compatible_versions:
  - "1.8"

# assembly: Sci-ModoM's nomenclature (Ensembl): UCSC's nomenclature.
# chrom.mapping: path to a tsv with chrom mapping from Ensembl to UCSC.
# chrom.sizes: chrom sizes - null if fetching data from Sci-ModoM.
# If chrom.sizes is given, it must follow the UCSC specs.
# label: this is added to the track labels.
genomes:
  h_sapiens:
    taxa_id: 9606
    assembly:
      GRCh38: "hg38"
    chroms:
      mapping: data/GRCh38_ensembl2UCSC.tsv
      sizes: local/hg38.chrom.sizes # null
    label: "human"
  m_musculus:
    taxa_id: 10090
    assembly:
      GRCm39: "mm39"
    chroms:
      mapping: data/GRCm39_ensembl2UCSC.tsv
      sizes: local/mm39.chrom.sizes #null
    label: "mouse"
  include:
    - h_sapiens
    - m_musculus

hub:
  hub:
    # A single-word name of the directory containing the track hub files. Not displayed to hub users.
    name: SciModHub
    # Maximum length is 17 characters. Displayed as the hub name.
    short_label: "Sci-ModoM Hub"
    # Maximum length is 80 characters. Displayed in the description field.
    long_label: "Sci-ModoM Genome Browser Tracks"
    email: "boileau@uni-heidelberg.de"
  track_db:
    # The composite's track name (parent). Each subtrack name is <parentTrackName>_<primaryKeyValue>.
    # <primaryKeyValue> is derived from the metadata and used for faceting.
    name: SciModoM
    # Each subtrack is automatically annotated; these labels are for the "parent" track.
    # NOTE: the assembly label (see genomes above) is added to the short_label and long_label.
    # Total maximum length is 17 characters.
    short_label: "Sci-ModoM"
    # Total maximum length is 76 characters.
    long_label: "Sci-ModoM RNA modification sites"
  # Score-based shading and filtering is disabled.
  # The bedRMod score policy defines how to handle the 5th field:
  # preserve (keep score), zero (set score to 0, add raw_score to 12th field)
  # coverage (replace score with coverage - coverage > 0,  add raw_score to 12th field, EUF version < 2)
  score_policy: replace
  # Defaults
  max_check_boxes: 20
  hide_empty_subtracks: true
  center_labels_dense: true
  all_button_pair: true
  drag_and_drop_subtracks: true

# Defines the itemRgb color palette using the "frequency".
display:
  frequency_color_min: "0,0,255"
  frequency_color_max: "255,0,0"
